version: '3.8'

services:

  api:
    build: .

    env_file:
      - .env

    ports:
      - "1313:1313"

    volumes:
      - .:/app

    environment:
      - FLASK_ENV=development

      - DATABASE_URL=mysql+pymysql://root:SENHA@db:3306/doceria_db

    depends_on:
      - db


  db:
    image: mysql:8.0

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: SENHA

      MYSQL_DATABASE: doceria_db

    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql


volumes:
  db_data: